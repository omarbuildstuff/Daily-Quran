<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#b8a0a0" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0ee"/>
      <stop offset="100%" stop-color="#e8ddd8"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f0e8e4"/>
    </linearGradient>
    <linearGradient id="circle-outer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0d4ce"/>
      <stop offset="100%" stop-color="#c8b8b0"/>
    </linearGradient>
    <linearGradient id="circle-inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2ef"/>
      <stop offset="100%" stop-color="#e8dcd6"/>
    </linearGradient>
    <linearGradient id="bookmark" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8dcd6"/>
      <stop offset="100%" stop-color="#d4c4bc"/>
    </linearGradient>
  </defs>
  <!-- Outer book shape -->
  <rect x="4" y="4" width="105" height="118" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner page -->
  <rect x="22" y="20" width="70" height="84" rx="8" fill="url(#inner)" stroke="#e0d6d0" stroke-width="1.5"/>
  <!-- Center circle outer -->
  <circle cx="57" cy="62" r="22" fill="url(#circle-outer)"/>
  <!-- Center circle inner -->
  <circle cx="57" cy="62" r="14" fill="url(#circle-inner)" stroke="#fff" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="57" cy="62" r="6" fill="url(#circle-outer)" opacity="0.5"/>
  <!-- Bookmark ribbon -->
  <path d="M88 100 L88 128 L97 120 L106 128 L106 100 Z" fill="url(#bookmark)" stroke="#d4c4bc" stroke-width="0.5"/>
</svg>
